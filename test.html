<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Train Route Mapper</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f0f4f8; }
  #panel {
    width: 360px; flex-shrink: 0; background: #fff;
    box-shadow: 4px 0 20px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; padding: 24px; gap: 20px;
    overflow-y: auto; z-index: 10;
  }
  h2 { font-size: 1.2em; color: #1a1a2e; font-weight: 700; }
  h4 { font-size: 0.8em; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .station-block { display: flex; flex-direction: column; gap: 8px; }
  input[type="text"] {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid #dde1e7; border-radius: 8px;
    font-size: 0.9em; background: #fafbfc;
    transition: border-color 0.2s; outline: none;
  }
  input:focus { border-color: #3b82f6; }
  .autocomplete-wrapper { position: relative; }
  .dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #fff; border: 1px solid #dde1e7; border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1); z-index: 1000;
    max-height: 220px; overflow-y: auto; display: none;
  }
  .dropdown-item {
    padding: 10px 14px; cursor: pointer; font-size: 0.85em;
    border-bottom: 1px solid #f3f4f6; transition: background 0.15s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: #eff6ff; }
  .dropdown-item strong { display: block; color: #1a1a2e; }
  .dropdown-item span { color: #888; font-size: 0.82em; }
  .selected-station {
    padding: 10px 12px; background: #eff6ff;
    border: 1.5px solid #bfdbfe; border-radius: 8px;
    font-size: 0.85em; color: #1e40af; font-weight: 600;
    display: none; align-items: center; justify-content: space-between; gap: 8px;
  }
  .selected-station.show { display: flex; }
  .selected-station span { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .clear-btn { background: none; border: none; color: #93c5fd; cursor: pointer; font-size: 1.1em; }
  .clear-btn:hover { color: #1e40af; }
  .divider { display: flex; align-items: center; gap: 10px; color: #aaa; font-size: 0.8em; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
  #find-btn {
    padding: 12px; background: #3b82f6; color: white; border: none;
    border-radius: 8px; font-size: 0.95em; font-weight: 700; cursor: pointer;
  }
  #find-btn:hover:not(:disabled) { background: #2563eb; }
  #find-btn:disabled { background: #93c5fd; cursor: not-allowed; }
  #status { font-size: 0.82em; color: #555; line-height: 1.6; min-height: 20px; }
  #status.error { color: #dc2626; }
  #status.success { color: #16a34a; }
  #results { font-size: 0.82em; }
  .result-tag {
    display: inline-block; background: #eff6ff; border: 1px solid #bfdbfe;
    color: #1e40af; padding: 4px 10px; border-radius: 20px;
    font-size: 0.85em; font-weight: 600; margin: 2px 2px 2px 0;
  }
  #map { flex: 1; }
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #93c5fd; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 6px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="panel">
  <div>
    <h2>Train Route Mapper</h2>
    <p style="font-size:0.8em;color:#888;margin-top:4px;">Station search via Photon · Graph path via BRouter</p>
  </div>

  <div class="station-block">
    <h4>Origin</h4>
    <div class="autocomplete-wrapper">
      <input type="text" id="input-a" placeholder="City or station name…" autocomplete="off" />
      <div class="dropdown" id="dropdown-a"></div>
    </div>
    <div class="selected-station" id="selected-a">
      <span id="selected-a-label"></span>
      <button class="clear-btn" onclick="clearStation('a')">✕</button>
    </div>
  </div>

  <div class="divider">to</div>

  <div class="station-block">
    <h4>Destination</h4>
    <div class="autocomplete-wrapper">
      <input type="text" id="input-b" placeholder="City or station name…" autocomplete="off" />
      <div class="dropdown" id="dropdown-b"></div>
    </div>
    <div class="selected-station" id="selected-b">
      <span id="selected-b-label"></span>
      <button class="clear-btn" onclick="clearStation('b')">✕</button>
    </div>
  </div>

  <button id="find-btn" onclick="findRoute()" disabled>Find Route</button>
  <div id="status"></div>
  <div id="results"></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([48, 12], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', {
  attribution: '© OpenRailwayMap', opacity: 0.5, maxZoom: 19
}).addTo(map);

let routeLayer = null;
const stationMarkers = [];
const stations = { a: null, b: null };

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = type || '';
  el.innerHTML = msg;
}

function updateFindBtn() {
  document.getElementById('find-btn').disabled = !(stations.a && stations.b);
}

function clearStation(key) {
  stations[key] = null;
  document.getElementById('input-' + key).value = '';
  document.getElementById('selected-' + key).classList.remove('show');
  updateFindBtn();
}

function selectStation(key, s) {
  stations[key] = s;
  document.getElementById('selected-' + key + '-label').textContent = s.detail ? (s.name + ' — ' + s.detail) : s.name;
  document.getElementById('selected-' + key).classList.add('show');
  document.getElementById('input-' + key).value = '';
  document.getElementById('dropdown-' + key).style.display = 'none';
  updateFindBtn();
}

async function searchStations(query, key) {
  const dropdown = document.getElementById('dropdown-' + key);
  dropdown.innerHTML = '<div class="dropdown-item"><span><span class="spinner"></span>Searching…</span></div>';
  dropdown.style.display = 'block';

  try {
    const url = 'https://photon.komoot.io/api/?q=' + encodeURIComponent(query) + '&limit=10&osm_tag=railway:station&osm_tag=railway:halt';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Photon HTTP ' + res.status);
    const data = await res.json();
    const features = (data.features || []).filter(function(f) {
      const p = f.properties || {};
      return p.name && (p.osm_type || p.osm_id) && f.geometry && f.geometry.coordinates;
    });

    if (!features.length) {
      dropdown.innerHTML = '<div class="dropdown-item"><span>No stations found.</span></div>';
      return;
    }

    dropdown.innerHTML = '';
    features.forEach(function(f) {
      const p = f.properties || {};
      const name = p.name || 'Unnamed station';
      const parts = [p.city || p.town || p.village, p.state, p.country].filter(Boolean);
      const detail = parts.join(', ');
      const lon = f.geometry.coordinates[0];
      const lat = f.geometry.coordinates[1];

      const item = document.createElement('div');
      item.className = 'dropdown-item';
      item.innerHTML = '<strong>' + escapeHtml(name) + '</strong><span>' + escapeHtml(detail || 'Station result') + '</span>';
      item.onclick = function() {
        selectStation(key, {
          name: name,
          detail: detail,
          lat: lat,
          lon: lon,
          osmId: p.osm_id,
          osmType: p.osm_type
        });
      };
      dropdown.appendChild(item);
    });
  } catch (err) {
    dropdown.innerHTML = '<div class="dropdown-item"><span style="color:#dc2626">Error: ' + escapeHtml(err.message) + '</span></div>';
  }
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function addStationMarkers() {
  ['a', 'b'].forEach(function(key) {
    const s = stations[key];
    if (!s) return;
    const m = L.circleMarker([s.lat, s.lon], {
      radius: 8,
      color: '#fff',
      weight: 2.5,
      fillColor: '#1e40af',
      fillOpacity: 1
    }).bindPopup('<strong>' + escapeHtml(s.name) + '</strong><br><small>' + escapeHtml(s.detail || '') + '</small>').addTo(map);
    stationMarkers.push(m);
  });
}

async function findRoute() {
  if (!stations.a || !stations.b) return;

  setStatus('<span class="spinner"></span>Querying BRouter for rail path...', '');
  document.getElementById('results').innerHTML = '';
  document.getElementById('find-btn').disabled = true;

  // Clear existing route and markers
  if (routeLayer) {
    map.removeLayer(routeLayer);
    routeLayer = null;
  }
  stationMarkers.forEach(function(m) { map.removeLayer(m); });
  stationMarkers.length = 0;

  try {
    addStationMarkers();

    // Construct the BRouter API URL
    // Format: lonlats=lon1,lat1|lon2,lat2
    const lonlats = `${stations.a.lon},${stations.a.lat}|${stations.b.lon},${stations.b.lat}`;
    const brouterUrl = `https://brouter.de/brouter?lonlats=${lonlats}&profile=rail&alternativeidx=0&format=geojson`;

    const res = await fetch(brouterUrl);
    if (!res.ok) throw new Error('BRouter HTTP ' + res.status);
    
    const geojson = await res.json();

    if (!geojson.features || geojson.features.length === 0) {
      throw new Error('No valid rail route returned by BRouter.');
    }

    // Draw the GeoJSON track returned by BRouter
    routeLayer = L.geoJSON(geojson, {
      style: {
        color: '#ef4444',
        weight: 5,
        opacity: 0.9
      }
    }).addTo(map);

    // Zoom the map to fit the route
    map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });

    // Extract stats from BRouter's response properties
    const props = geojson.features[0].properties || {};
    const trackLengthMeters = props['track-length'] || 0;
    const distanceKm = (trackLengthMeters / 1000).toFixed(1);

    document.getElementById('results').innerHTML =
      '<div style="color:#15803d;font-weight:700;margin-bottom:6px;">✓ Route mapped via BRouter</div>' +
      '<span class="result-tag">Track length: ' + distanceKm + ' km</span>';

    setStatus('Showing rail path between <strong>' + escapeHtml(stations.a.name) + '</strong> and <strong>' + escapeHtml(stations.b.name) + '</strong>.', 'success');

  } catch (err) {
    setStatus('Error: ' + escapeHtml(err.message), 'error');
  }

  document.getElementById('find-btn').disabled = false;
}

// Attach event listeners for the input search fields
['a', 'b'].forEach(function(key) {
  let timer;
  const input = document.getElementById('input-' + key);
  const dropdown = document.getElementById('dropdown-' + key);

  input.addEventListener('input', function() {
    clearTimeout(timer);
    const val = input.value.trim();
    if (val.length < 2) {
      dropdown.style.display = 'none';
      return;
    }
    timer = setTimeout(function() { searchStations(val, key); }, 350);
  });

  document.addEventListener('click', function(e) {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });
});
</script>
</body>
</html>
